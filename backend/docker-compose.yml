services:
  mysql:
    image: mysql:8
    container_name: mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: admin
      MYSQL_DATABASE: lab_nanomateriales
      MYSQL_USER: lab_user
      MYSQL_PASSWORD: lab_pass
    ports:
    - "3307:3306"

    volumes: 
      - mysql_data:/var/lib/mysql
volumes: 
  mysql_data: